                    <!--BLOG SECTION from API-->
                </div>

            <section>
                <h4 class="mb-5 text-center"><strong>CONTACT US</strong></h4>
                <div class="row" id="contact-section">
                    <div class="col-md-6 d-none d-md-block d-lg-block">
                        <img src="assets/images/contact.svg" height="360" alt="Wild Landscape" />
                    </div>
                    <div class="col-md-6 col-sm-12">
                        <form class="text-center" id="contactusFrm">
                            <!-- Name input -->
                            <div class="form-outline mb-4">
                                <input type="text" name="name" class="form-control" required>
                                <label class="form-label" for="custom-validation-name" style="margin-left: 0px;">Name</label>
                                <div class="form-notch">
                                    <div class="form-notch-leading" style="width: 9px;"></div>
                                    <div class="form-notch-middle" style="width: 42.4px;"></div>
                                    <div class="form-notch-trailing"></div>
                                </div>
                            </div>

                            <!-- Email input -->
                            <div class="form-outline mb-4">
                                <input type="email" name="email" class="form-control" required>
                                <label class="form-label" for="custom-validation-email" style="margin-left: 0px;">Email address</label>
                                <div class="form-notch">
                                    <div class="form-notch-leading" style="width: 9px;"></div>
                                    <div class="form-notch-middle" style="width: 88.8px;"></div>
                                    <div class="form-notch-trailing"></div>
                                </div>
                            </div>

                            <!-- Subject input -->
                            <div class="form-outline mb-4">
                                <input type="text" name="subject" class="form-control" required>
                                <label class="form-label" for="custom-validation-subject" style="margin-left: 0px;">Subject</label>
                                <div class="form-notch">
                                    <div class="form-notch-leading" style="width: 9px;"></div>
                                    <div class="form-notch-middle" style="width: 50.4px;"></div>
                                    <div class="form-notch-trailing"></div>
                                </div>
                            </div>

                            <!-- Message input -->
                            <div class="form-outline mb-4">
                                <textarea class="form-control" name="message" rows="4" required></textarea>
                                <label class="form-label" for="custom-validation-message" style="margin-left: 0px;">Message</label>
                                <div class="form-notch">
                                    <div class="form-notch-leading" style="width: 9px;"></div>
                                    <div class="form-notch-middle" style="width: 60px;"></div>
                                    <div class="form-notch-trailing"></div>
                                </div>
                            </div>

                            <!-- Submit button -->
                            <button class="btn btn-primary btn-block mb-4">Send</button>
                        </form>
                    </div>
                </div>
            </section>

        </div>
    </main>
    <!--Main layout-->
